server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types text/html text/css application/javascript application/json image/svg+xml;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Static assets: cache 1 year
    location ~* \.(css|js|png|jpg|jpeg|gif|svg|ico|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # HTML: no cache
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Legal pages
    location = /termos-de-uso {
        try_files /termos-de-uso.html =404;
    }
    location = /politica-de-privacidade {
        try_files /politica-de-privacidade.html =404;
    }
    location = /politica-de-cookies {
        try_files /politica-de-cookies.html =404;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
