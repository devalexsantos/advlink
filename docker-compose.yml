services:
  postgres:
    image: postgres:16-alpine
    container_name: advlink-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: advlink
      POSTGRES_PASSWORD: advlink
      POSTGRES_DB: advlink
    ports:
      - "5432:5432"
    volumes:
      - advlink_pgdata:/var/lib/postgresql/data

volumes:
  advlink_pgdata:
